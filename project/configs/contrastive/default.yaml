run:
  mode: dry_run
  task: contrastive
  seed: 42

data:
  root: hackaton
  images_h5: images_reduced.h5
  spectra_h5: spectra.h5
  partitions_dir: partitions/v1/ssl
  fold: 0
  batch_size: 32
  num_workers: 0

train:
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  contrastive_accumulation_steps: 1
  gradient_clip_norm: null
  lr_scheduler: none
  min_learning_rate: 0.0
  early_stopping_patience: null
  early_stopping_min_delta: 0.0
  temperature: 0.07
  max_train_samples: 256
  max_val_samples: 128
  save_checkpoint: true

model:
  image_channels: null
  spectrum_length: 739
  embedding_dim: 128
  projection_dim: 128
  encoder_width: 1.0
  encoder_variant: simple
  dropout: 0.0

resources:
  num_gpus: 0
  gpu_fraction_per_training: 1.0
  device: auto

outputs:
  root: project/results
  reports_dir: project/reports
  contrastive_dir: project/results/contrastive/dry_run

eval:
  checkpoint_path: project/results/contrastive/dry_run/best.pt
  split: val
  max_samples: 128
  output_dir: project/results/contrastive/dry_run_eval
